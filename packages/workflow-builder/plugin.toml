capabilities = [
  "takeover.register",
  "workflow.read",
  "workflow.write",
  "db.read",
  "db.write",
  "llm.call",
  "secrets.read",
  "net.fetch",
  "worker.run",
]

toolCatalogContributor = false

[identity]
name        = "workflow-builder"
type        = "workflow-builder"
version     = "1.2.0"
publisher   = "tupiflow"
description = "Internal tools that let an AI agent introspect this app: agents, actions, workflows, executions, connections, tools, plus core meta-actions like human-takeover."

[runtime]
min_tupiflow_version = "0.0.0"

[icon]
kind = "svg"
path = "icon.svg"

# Phase 4f batch 1 — plugin-defined workers (registry schema §workers[]).
# entry must match the output path built by buildPlugin (workers/<id>.mjs).
# id + entry here are documentation; the authoritative values come from
# opts.workers in build.mjs (which generates manifest.workers[]).
[[workers]]
id          = "compute-hash"
entry       = "workers/compute-hash.mjs"
memLimitMb  = 64
timeoutMs   = 5000

[[takeoverTargets]]
actionId    = "request-human-takeover"
label       = "Request human takeover"
description = "Hand the conversation over to a human operator from a chat connection workflow."
