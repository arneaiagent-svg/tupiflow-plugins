[runtime]
min_tupiflow_version = "0.0.0"
requires_host_restart = true

[icon]
kind = "svg"
path = "icon.svg"

[required_npm_deps]
"chat-adapter-baileys" = "^2.0.2"
"chat"                 = "^4.26.0"
