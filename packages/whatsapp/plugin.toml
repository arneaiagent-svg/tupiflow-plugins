capabilities = ["net.fetch", "secrets.read", "connection.lifecycle", "workflow.dispatch", "integration.test", "chat.takeover.read", "chat.history.write", "telemetry.write", "worker.run", "route.context.user", "db.read"]

[identity]
name        = "whatsapp"
type        = "whatsapp"
version     = "0.1.0"
publisher   = "tupiflow"
